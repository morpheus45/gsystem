name: Build Android APK

# Déclenché à chaque push sur main, sur tag de version (vX.Y.Z) et sur demande manuelle.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# contents: write requis pour publier une Release quand un tag est poussé.
permissions:
  contents: write

# Clé de production exposée au job. Vide tant que le secret n'est pas configuré
# → on retombe automatiquement sur un build debug (CI toujours verte).
env:
  RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew

      # Décode la clé de prod depuis le secret (base64) vers un fichier non
      # versionné, et expose son chemin à Gradle. Sauté si le secret est absent.
      - name: Decode release keystore
        if: env.RELEASE_KEYSTORE_BASE64 != ''
        run: |
          mkdir -p keystore
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > keystore/release.keystore
          echo "RELEASE_STORE_FILE=keystore/release.keystore" >> "$GITHUB_ENV"

      # Sur un tag vX.Y.Z avec clé prod présente → APK release signé prod.
      # Sinon (push courant, PR, secret absent) → APK debug.
      - name: Build APK
        id: build
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          # Canal "sideload" = l'APK GitHub Releases (auto-update + IntegrityGuard).
          # La variante Play (AAB) est produite par playstore-release.yml.
          if [ -n "$RELEASE_STORE_FILE" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "variant=release" >> "$GITHUB_OUTPUT"
            ./gradlew :app:assembleSideloadRelease --stacktrace
          else
            echo "variant=debug" >> "$GITHUB_OUTPUT"
            ./gradlew :app:assembleSideloadDebug --stacktrace
          fi

      - name: Locate generated APK
        id: apk
        run: |
          APK_PATH=$(find "app/build/outputs/apk/sideload/${{ steps.build.outputs.variant }}" -name "*.apk" ! -name "*unsigned*" | head -n 1)
          echo "Found APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gsystem-${{ steps.build.outputs.variant }}-apk
          path: ${{ steps.apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30

      # --- Publication automatique d'une Release quand un tag vX.Y.Z est poussé ---
      # L'app (UpdateChecker) lit /releases/latest et propose la MAJ aux techs.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "${{ steps.apk.outputs.apk_path }}" "gsystem-${{ github.ref_name }}.apk"
          gh release create "${{ github.ref_name }}" "gsystem-${{ github.ref_name }}.apk" \
            --title "${{ github.ref_name }}" \
            --generate-notes
