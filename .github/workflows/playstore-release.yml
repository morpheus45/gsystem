# Workflow GitHub Actions — build de l'AAB signé pour Google Play
#
# COPIER ce fichier en : .github/workflows/playstore-release.yml
#
# Secrets requis (Repo → Settings → Secrets and variables → Actions) :
#   UPLOAD_KEYSTORE_BASE64  = base64 du fichier gsystem-upload.jks
#   UPLOAD_STORE_PASSWORD   = mot de passe du keystore
#   UPLOAD_KEY_ALIAS        = gsystem-upload
#   UPLOAD_KEY_PASSWORD     = mot de passe de la clé
#
# Déclenchement : manuel (workflow_dispatch) OU sur tag "play-v*".
# Produit l'AAB en ARTEFACT téléchargeable → à téléverser ensuite dans la Console.
# (Voir playstore/signing-and-build.md)

name: Play Store Release (AAB)

on:
  workflow_dispatch:
  push:
    tags:
      - 'play-v*'

permissions:
  contents: read

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # Le repo ne versionne pas le wrapper : on le génère si absent (comme la CI APK).
      - name: Generate Gradle wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x gradlew

      - name: Decode upload keystore
        env:
          KEYSTORE_B64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > "$GITHUB_WORKSPACE/gsystem-upload.jks"

      - name: Create key.properties
        env:
          STORE_PASSWORD: ${{ secrets.UPLOAD_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          cat > "$GITHUB_WORKSPACE/key.properties" <<EOF
          RELEASE_STORE_FILE=gsystem-upload.jks
          RELEASE_STORE_PASSWORD=$STORE_PASSWORD
          RELEASE_KEY_ALIAS=$KEY_ALIAS
          RELEASE_KEY_PASSWORD=$KEY_PASSWORD
          EOF

      # build.gradle.kts lit aussi les variables d'environnement RELEASE_* :
      # on les fournit pour être sûr que hasReleaseKey = true.
      - name: Build signed AAB
        env:
          RELEASE_STORE_FILE: gsystem-upload.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.UPLOAD_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew || true
          # Flavor "play" → AAB conforme Google Play.
          ./gradlew :app:bundlePlayRelease --no-daemon --stacktrace

      - name: Locate generated AAB
        id: aab
        run: |
          AAB_PATH=$(find app/build/outputs/bundle/playRelease -name "*.aab" | head -n 1)
          echo "Found AAB: $AAB_PATH"
          echo "aab_path=$AAB_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: gsystem-play-aab
          path: ${{ steps.aab.outputs.aab_path }}
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f "$GITHUB_WORKSPACE/gsystem-upload.jks" "$GITHUB_WORKSPACE/key.properties"
